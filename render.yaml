services:
  - type: web
    name: kavach-intelligence
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "python -m uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: UPLOAD_FOLDER
        value: backend/uploads
